<!DOCTYPE html>
<html>
<body>
<!--Para crear un link-->
<a href="https://www.w3schools.com">Visit W3Schools</a>
<!--The src Attribute para buscar una imagen-->
<img src="img_girl.jpg">
<!--Absolute URL-->
<img src="https://www.w3schools.com/images/img_girl.jpg">
<!--Relative URL-->
<img src="img_girl.jpg">
<!--This is the width and height Attributes-->
<img src="img_girl.jpg" width="500" height="600">
<!--This is the alt Attribute-->
<img src="img_girl.jpg" alt="Girl with a jacket">
<!--This is the style Attribute-->
<p style="color:red;">This is a red paragraph.</p>
<!--This is the lang Attribute-->
<!DOCTYPE html>
<html lang="en">
<body>
...
</body>
</html>
<!--This is the title Attribute-->
<p title="I'm a tooltip">This is a paragraph.</p>
<!--Single or Double Quotes?-->
<p title='John "ShotGun" Nelson'></p>
<!--Or vice versa-->
<p title="John 'ShotGun' Nelson"></p>

</body>
</html>
