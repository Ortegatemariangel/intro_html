<!DOCTYPE html>
<html>
<body>

<!--HTML <b> and <strong> Elements-->

    <!--<b> Define el texto en negrita, sin niguna importancia-->
    <b>This text is bold</b>

    <!--<strong> Define el texto en negrita, con importancia-->
    <strong>This text is important</strong>

<!--HTML <i> and <em> Elements-->

    <!--<i> Define el texto en cursiva, sin niguna importancia-->
    <i>This text is italic</i>

    <!--<em> Define el texto en cursiva, con importancia-->
    <em>This text is emphasized</em>

<!--HTML <mark> Element-->

    <!--Define el texto resaltado-->
    <mark>This text is marked</mark>

<!--HTML <small> Element-->
    <!--Define el texto en tamaño pequeño-->
    <small>This text is small</small>

<!--HTML <del> Element-->
    <!--Define el texto eliminado-->
    <del>This text is deleted</del>

<!--HTML <ins> Element-->
    <!--Define el texto insertado-->
    <ins>This text is inserted</ins>

<!--HTML <sub> Element-->
    <!--Define el texto en subíndice-->
    <sub>This text is subscript</sub>
    
<!--HTML <sup> Element-->
    <!--Define el texto en superíndice-->
    <sup>This text is superscript</sup>


</body>
</html>
